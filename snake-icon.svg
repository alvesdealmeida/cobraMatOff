<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo escuro -->
  <rect width="512" height="512" rx="80" fill="#0a0a1a"/>

  <!-- Grade de fundo (pixels do jogo) -->
  <rect x="30"  y="30"  width="452" height="452" rx="10" fill="#10102a"/>

  <!-- Estrelinhas -->
  <circle cx="60"  cy="60"  r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="450" cy="80"  r="2" fill="#00ff88" opacity="0.4"/>
  <circle cx="80"  cy="440" r="2" fill="#4dc8ff" opacity="0.35"/>
  <circle cx="440" cy="440" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="260" cy="50"  r="1.5" fill="#ffe94d" opacity="0.4"/>

  <!-- Corpo da cobra (blocos pixelados) -->
  <!-- Cauda -->
  <rect x="70"  y="290" width="46" height="46" rx="8" fill="#00bb66"/>
  <!-- Segmento 2 -->
  <rect x="122" y="290" width="46" height="46" rx="8" fill="#00cc70"/>
  <!-- Segmento 3 -->
  <rect x="174" y="290" width="46" height="46" rx="8" fill="#00d975"/>
  <!-- Dobra para cima -->
  <rect x="174" y="238" width="46" height="46" rx="8" fill="#00df7a"/>
  <!-- Segmento horizontal -->
  <rect x="226" y="238" width="46" height="46" rx="8" fill="#00e87f"/>
  <!-- Segmento horizontal 2 -->
  <rect x="278" y="238" width="46" height="46" rx="8" fill="#00ef82"/>
  <!-- Dobra para baixo -->
  <rect x="278" y="290" width="46" height="46" rx="8" fill="#00f585"/>
  <!-- Segmento baixo -->
  <rect x="278" y="342" width="46" height="46" rx="8" fill="#00fa87"/>
  <!-- Pescoço -->
  <rect x="330" y="342" width="46" height="46" rx="8" fill="#00fc88"/>
  <!-- Cabeça -->
  <rect x="330" y="238" width="58" height="100" rx="12" fill="#00ff88"/>

  <!-- Olhos da cobra -->
  <circle cx="348" cy="262" r="7" fill="#0a0a1a"/>
  <circle cx="372" cy="262" r="7" fill="#0a0a1a"/>
  <!-- Brilho nos olhos -->
  <circle cx="350" cy="260" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="374" cy="260" r="3" fill="#ffffff" opacity="0.9"/>
  <!-- Língua bifurcada -->
  <rect x="380" y="280" width="28" height="5" rx="2.5" fill="#ff4d6d"/>
  <line x1="408" y1="282" x2="420" y2="274" stroke="#ff4d6d" stroke-width="4" stroke-linecap="round"/>
  <line x1="408" y1="282" x2="420" y2="292" stroke="#ff4d6d" stroke-width="4" stroke-linecap="round"/>

  <!-- Comida (número correto brilhando) -->
  <rect x="140" y="150" width="60" height="60" rx="10" fill="#ffe94d" opacity="0.15"/>
  <rect x="140" y="150" width="60" height="60" rx="10" fill="none" stroke="#ffe94d" stroke-width="2" opacity="0.8"/>
  <text x="170" y="193" font-family="Arial Black, sans-serif" font-size="30" font-weight="900"
        text-anchor="middle" fill="#ffe94d">7</text>

  <!-- Número errado 1 -->
  <text x="90"  y="200" font-family="Arial, sans-serif" font-size="22" font-weight="700"
        text-anchor="middle" fill="#4dc8ff" opacity="0.6">3</text>
  <!-- Número errado 2 -->
  <text x="410" y="180" font-family="Arial, sans-serif" font-size="22" font-weight="700"
        text-anchor="middle" fill="#c084fc" opacity="0.6">9</text>

  <!-- Pergunta no topo -->
  <rect x="60" y="68" width="392" height="52" rx="10" fill="#1a1a44" opacity="0.9"/>
  <rect x="60" y="68" width="392" height="52" rx="10" fill="none" stroke="#4dc8ff" stroke-width="1.5" opacity="0.7"/>
  <text x="256" y="100" font-family="Arial Black, sans-serif" font-size="22" font-weight="900"
        text-anchor="middle" fill="#f0f0ff">3 + 4 = ?</text>

  <!-- Glow ao redor da cobra -->
  <rect x="328" y="236" width="62" height="104" rx="14" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.3"/>

  <!-- Texto "SNAKE MAT." na base -->
  <text x="256" y="468" font-family="Arial Black, sans-serif" font-size="24" font-weight="900"
        text-anchor="middle" fill="#00ff88" letter-spacing="1" opacity="0.9">SNAKE MAT.</text>
</svg>
